; Watering-backpack pump controller — QuinLED-ESP32 (ESP32-WROOM-32)
;
;   pio run -t upload      # build + flash
;   pio device monitor     # serial @ 115200
;
; This resolves to Arduino-ESP32 3.x, whose LEDC PWM uses the pin-based API
; (ledcAttach / ledcWrite(pin, duty)) — that's what src/main.cpp uses.
[env:quinled-esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
